<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FBF8F2" />
<title>Franco Manca — Digital Menu</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%95%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Mono:wght@400;700&family=Noto+Sans:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --ink:#181410; --paper:#FBF8F2; --paper2:#F3EEE2;
  --red:#DE4A26; --red-dark:#A9331A;
  --peach:#F3C7A0; --peach-line:rgba(24,20,16,.22);
  --rule:rgba(24,20,16,.82); --muted:rgba(24,20,16,.62);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:'Space Mono','Noto Sans Mono','Noto Sans SC',monospace;
  -webkit-tap-highlight-color:transparent;
}
::-webkit-scrollbar{display:none;} *{scrollbar-width:none;-ms-overflow-style:none;}
h1,h2,h3,h4{margin:0;}
.marker{font-family:'Permanent Marker','Noto Sans SC','Noto Sans',cursive;}
.wordmark{font-family:'Archivo Black','Noto Sans SC','Noto Sans',sans-serif;}

/* ---- frame ---- */
.frame-rule{height:5px;background:var(--rule);position:relative;}
.frame-rule::before,.frame-rule::after{
  content:"";position:absolute;top:-8px;width:2px;height:16px;background:var(--rule);
}
.frame-rule::before{left:14px;} .frame-rule::after{right:14px;}
.menu-wrap{max-width:1360px;margin:0 auto;}

/* ---- sticky control bar ---- */
.control-bar{position:sticky;top:0;z-index:50;background:rgba(251,248,242,.96);backdrop-filter:blur(6px);
  border-bottom:2px dashed var(--peach-line); padding:9px 14px;}
.control-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;max-width:1360px;margin:0 auto;}
.brandmini{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.brandmini .pizza-icon-sm{width:30px;height:30px;flex-shrink:0;}
.brandmini .wordmark{font-size:15px;letter-spacing:.01em;}
.lang-row{display:flex;gap:6px;overflow-x:auto;flex:1;min-width:120px;}
.lang-chip{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;padding:5px 10px;border-radius:9999px;
  border:1.5px solid var(--ink);background:var(--paper);font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;
  transition:background-color .15s ease,color .15s ease,transform .15s ease;}
.lang-chip.active{background:var(--red);color:var(--paper);border-color:var(--red-dark);transform:translateY(-1px);}
.page-tabs{display:flex;gap:6px;flex-shrink:0;}
.page-tab{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:5px 10px;
  border:1.5px solid var(--ink);border-radius:9999px;background:var(--paper);cursor:pointer;white-space:nowrap;}
.page-tab.active{background:var(--ink);color:var(--paper);}

/* ---- page break divider ---- */
.page-break{display:flex;align-items:center;gap:10px;padding:26px 20px;color:var(--muted);font-size:12px;}
.page-break .ln{flex:1;border-top:2px dashed var(--peach-line);}

/* ---- grid ---- */
.page-block{padding:22px 18px 10px;}
.page-grid{display:grid;grid-template-columns:1fr;gap:0;}
@media (min-width:900px){
  .page-grid{grid-template-columns:1fr 1fr 1fr;}
  .col{border-right:1px solid rgba(24,20,16,.18);padding:0 22px;}
  .col:last-child{border-right:none;}
}
.col{padding:0 4px 22px;}
.col-peach{background:var(--peach);border-radius:14px;padding:18px 20px 22px;}
@media (min-width:900px){.col-peach{margin-left:8px;border-right:none;}}

/* ---- boxed group ---- */
.boxed{border:2px solid var(--ink);border-radius:4px;padding:16px 16px 18px;margin-bottom:22px;}

/* ---- section headers ---- */
.sec-title{color:var(--red);font-size:26px;line-height:1;margin-top:22px;}
.boxed .sec-title:first-child, .col > .sec-title:first-child{margin-top:0;}
.sec-title-sm{color:var(--ink);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
  margin-top:16px;border-bottom:1px solid var(--ink);display:inline-block;padding-bottom:1px;}
.sec-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;margin-bottom:10px;}
.sec-rule{height:2px;margin:4px 0 12px;background:repeating-linear-gradient(90deg,var(--ink) 0 7px,transparent 7px 12px);}

.callout{display:inline-block;color:var(--red);font-size:12.5px;transform:rotate(-2deg);margin:2px 0 10px;
  border:1.5px dashed var(--red);border-radius:9999px;padding:5px 12px;}

.stamp-wrap{display:flex;justify-content:center;align-items:center;margin:14px 0 20px;}
.stamp-circle{
  width:124px;height:124px;flex-shrink:0;border-radius:50%;
  border:2px solid var(--red);
  display:flex;align-items:center;justify-content:center;
  text-align:center;color:var(--red);font-size:10.5px;line-height:1.28;
  letter-spacing:.01em;padding:14px;text-transform:uppercase;font-weight:700;
}

.divider-dots{border:none;border-top:1.5px dashed rgba(24,20,16,.4);margin:10px 0;}

/* ---- rows ---- */
.row{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:3px 0;}
.row .price{flex-shrink:0;font-weight:700;}
.codes{font-size:9.5px;color:var(--muted);letter-spacing:.04em;font-weight:700;margin-left:5px;vertical-align:super;}
.new-tag{color:var(--red);font-weight:700;font-size:11px;margin-right:5px;}
.star-icon{color:var(--red);margin-right:3px;}

.item-block{padding:7px 0;}
.item-head{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;}
.item-name{font-weight:700;}
.item-price{flex-shrink:0;font-weight:700;}
.item-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45;}
.annote{display:block;color:var(--red);font-size:11px;margin-top:4px;text-align:left;}

.subnote{font-size:12px;color:var(--muted);padding:1px 0 4px 14px;display:flex;justify-content:space-between;gap:10px;}

.tagblock{margin-top:12px;font-size:12px;}
.tagblock .tb-title{font-weight:700;text-transform:uppercase;font-size:11.5px;letter-spacing:.03em;}
.tagblock .tb-desc{margin-top:2px;}
.tagblock .tb-note{margin-top:4px;color:var(--muted);font-size:10.5px;line-height:1.4;}

.footer-text{font-size:10px;color:var(--muted);line-height:1.5;margin-top:16px;padding-top:10px;border-top:1px solid rgba(24,20,16,.18);}

/* ---- pizza rows ---- */
.pizza-row{display:flex;gap:10px;padding:8px 0;align-items:flex-start;}
.circle-num{width:24px;height:24px;border-radius:9999px;border:2px solid var(--ink);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px;}
.pizza-body{flex:1;min-width:0;}

/* ---- top groups ---- */
.topgroup{margin-top:14px;font-size:13px;}
.topgroup .tg-head{display:flex;justify-content:space-between;font-weight:700;text-decoration:underline;}
.topgroup .tg-list{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.5;}
.topgroup2{margin-top:14px;font-size:13px;}
.topgroup2 .tg-head{font-weight:700;text-decoration:underline;}
.topgroup2 .row{padding-left:4px;}

/* ---- wine ---- */
.wine-head{display:flex;justify-content:flex-end;gap:14px;font-size:10.5px;color:var(--muted);margin-top:10px;}
.wine-head span{width:46px;text-align:right;}
.wine-row{padding:6px 0;border-top:1px dotted rgba(24,20,16,.25);}
.wine-row:first-of-type{border-top:none;}
.wine-top{display:flex;justify-content:space-between;gap:10px;}
.wine-name{font-weight:700;font-size:13px;}
.wine-desc{font-size:11px;color:var(--muted);}
.wine-prices{display:flex;gap:14px;flex-shrink:0;}
.wine-prices span{width:46px;text-align:right;font-size:12.5px;font-weight:700;}

/* ---- pairs / dips grid ---- */
.pair-row{display:flex;gap:18px;font-size:13.5px;padding:3px 0;flex-wrap:wrap;}
.pair-row .item{flex:1;min-width:150px;display:flex;justify-content:space-between;gap:8px;}
.dips-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;font-size:13px;margin-top:8px;}
.dip-cell{display:flex;flex-direction:column;align-items:flex-start;gap:5px;}
.dip-name{line-height:1.3;}
.pill-note{
  border:1.5px dashed var(--red);border-radius:9999px;
  padding:5px 12px;color:var(--red);font-size:10px;line-height:1.25;
  max-width:150px;text-align:center;
}

/* ---- salad variants ---- */
.salad-block{margin-top:10px;}
.variant-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:2px 0 2px 14px;color:var(--ink);}

/* ---- drink rows (spritz / cocktails) ---- */
.drink-row{padding:8px 0;border-top:1px dotted var(--peach-line);}
.drink-row:first-of-type{border-top:none;}
.drink-top{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:13.5px;}
.drink-desc{font-size:11.5px;color:rgba(24,20,16,.7);margin-top:2px;line-height:1.4;}

/* ---- logo / story / dough ---- */
.logo-block{text-align:left;margin-bottom:4px;}
.logo-block .wordmark{font-size:34px;line-height:1;}
.illustration{width:112px;height:112px;margin:10px 0 6px;display:block;}
.story-text{font-size:12.5px;line-height:1.55;margin-top:10px;color:var(--ink);}
.wf-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--red);margin-left:8px;}

.calorie-note{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:10px;color:var(--muted);}
.calorie-qr{width:64px;height:64px;flex-shrink:0;background:var(--paper);border:1px solid rgba(24,20,16,.15);}
.calorie-qr canvas,.calorie-qr img{display:block;width:64px;height:64px;}

.signup-row{display:flex;align-items:center;gap:10px;margin-top:14px;}

/* ---- staff QR section ---- */
.staff-section{margin:30px 16px 40px;padding:18px 18px 20px;background:var(--paper2);
  border:2px dashed var(--rule);border-radius:14px;}
.staff-label{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--paper);background:var(--ink);padding:3px 9px;border-radius:4px;margin-bottom:10px;}
.staff-title{font-family:'Archivo Black',sans-serif;font-size:15px;}
.staff-desc{font-size:12px;color:var(--muted);margin:4px 0 14px;max-width:26rem;}
.qr-box{background:var(--paper);border-radius:10px;padding:12px;display:inline-flex;border:1px solid rgba(24,20,16,.2);}
.qr-url{font-size:10px;color:var(--muted);margin-top:10px;word-break:break-all;}
.qr-local-note{font-size:11.5px;color:var(--red-dark);background:rgba(222,74,38,.1);border:1px dashed var(--red);
  border-radius:8px;padding:8px 10px;margin:8px 0 14px;line-height:1.4;max-width:26rem;}
.download-btn{margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--paper);
  font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:9999px;border:none;cursor:pointer;font-family:inherit;}
.download-btn:hover{transform:translateY(-1px);}

.fm-note{font-size:11px;color:var(--muted);text-align:center;padding:0 16px 30px;line-height:1.5;}

:focus-visible{outline:2px solid var(--red-dark);outline-offset:2px;}

</style>
</head>

      <div class="brandmini">

  <section class="page-block" id="sec-page2">

  <section class="staff-section">

    <div class="staff-title">Table QR Code</div>
    <p class="staff-desc" data-i18n="ui.staffDesc">Scan or download this code to print on paper menus.</p>

    </button>
  </section>

  <p class="fm-note">Franco Manca · Sourdough Pizza</p>
</div>

<script>
/* Franco Manca — exact-layout multilingual menu renderer */
const LANGUAGES = [
  { code: 'en', flag: '🇬🇧', label: 'EN' },
  { code: 'es', flag: '🇪🇸', label: 'ES' },
  { code: 'it', flag: '🇮🇹', label: 'IT' },
  { code: 'pt', flag: '🇵🇹', label: 'PT' },
  { code: 'ru', flag: '🇷🇺', label: 'RU' },
  { code: 'zh', flag: '🇨🇳', label: '中文' }
];

let currentLang = 'en';

function esc(s){ return (s===undefined||s===null) ? '' : String(s); }

/* Always renders British-format prices with £ strictly before the number,
   regardless of the selected language (£2.00, +£3.15, £2.60 / £3.15, etc). */
function gbp(p){
  if(p===undefined || p===null || p==='') return '';
  return String(p).replace(/(\+)?(\d+(?:\.\d+)?)/g, (m, plus, num) => `${plus||''}£${num}`);
}

function codesHtml(codes){
  if(!codes || !codes.length) return '';
  return `<span class="codes">${codes.map(c=>c.toUpperCase()).join('\u00b7')}</span>`;
}

function newTag(row, t){
  return row.new ? `<span class="new-tag">${esc(t.ui && t.ui.newLabel)}</span>` : '';
}

/* ---- row renderers keyed by "kind" ---- */
const RENDERERS = {
  "header": (row,t)=>{
    const title = t[row.id];
    return `<h2 class="sec-title marker">${esc(title)}</h2><div class="sec-rule"></div>`;
  },
  "subheader": (row,t)=>`<h4 class="sec-title-sm">${esc(t[row.id])}</h4>`,

  "divider": ()=>`<hr class="divider-dots"/>`,
  "simple": (row,t)=>{
    const name = t[row.id];
    const price = row.price ? `<span class="price">${gbp(row.price)}</span>` : '';
    return `<div class="row"><span class="name">${esc(name)}${codesHtml(row.codes)}</span>${price}</div>`;
  },
  "item": (row,t)=>{
    const it = t[row.id] || {};
    const ann = row.annotation ? `<span class="annote marker">${esc(t[row.annotation])}</span>` : '';
    const nameLine = it.name
      ? `<span class="item-name">${row.star?'<span class="star-icon">\u2605</span>':''}${newTag(row,t)}${esc(it.name)}${codesHtml(row.codes)}</span>`
      : `<span class="item-name">${newTag(row,t)}${esc(it.desc)}${codesHtml(row.codes)}</span>`;
    const descLine = it.name && it.desc ? `<div class="item-desc">${esc(it.desc)}</div>` : '';
    return `<div class="item-block">
      <div class="item-head">${nameLine}<span class="item-price">${gbp(row.price)}</span></div>
      ${descLine}${ann}
    </div>`;
  },
  "pizza": (row,t)=>{
    const it = t[row.id] || {};
    const ann = row.annotation ? `<span class="annote marker">${esc(t[row.annotation])}</span>` : '';
    return `<div class="pizza-row">

      <div class="pizza-body">
        <div class="item-head">
          <span class="item-name">${row.star?'<span class="star-icon">\u2605</span>':''}${newTag(row,t)}${esc(it.name)}${codesHtml(row.codes)}</span>
          <span class="item-price">${gbp(row.price)}</span>
        </div>
        <div class="item-desc">${esc(it.desc)}</div>
        ${ann}
      </div>
    </div>`;
  },
  "subnote": (row,t)=>`<div class="subnote"><span>${esc(t[row.id])}${codesHtml(row.codes)}</span><span>${gbp(row.price)}</span></div>`,
  "tagblock": (row,t)=>{
    const b = t[row.id] || {};
    return `<div class="tagblock">
      <div class="tb-title">${esc(b.title)}</div>
      <div class="tb-desc">${esc(b.desc)}</div>
      ${b.note?`<div class="tb-note">${esc(b.note)}</div>`:''}
    </div>`;
  },
  "footer": (row,t)=>`<div class="footer-text">${esc(t[row.id])}${row.id==='foot.allergens'?legendLine(t):''}</div>`,
  "topgroup": (row,t)=>{
    const g = t[row.id] || {};
    return `<div class="topgroup">
      <div class="tg-head"><span>${esc(g.title)}</span><span>${gbp(row.price)}</span></div>
      <div class="tg-list">${esc(g.list)}</div>
    </div>`;
  },
  "topgroup2": (row,t)=>{
    const g = t[row.id] || {};
    return `<div class="topgroup2">
      <div class="tg-head">${esc(g.title)}</div>
      <div class="row"><span>${esc(g.item1)}</span><span class="price">${gbp(row.price1)}</span></div>
      <div class="row"><span>${esc(g.item2)}</span><span class="price">${gbp(row.price2)}</span></div>
    </div>`;
  },
  "text": (row,t)=>`<p class="story-text">${esc(t[row.id])}</p>`,
  "story": (row,t)=>`<p class="story-text">${esc(t[row.id])}</p>`,
  "logo-block": ()=>`<div class="logo-block">
      <div class="wordmark">FRANCO MANCA</div>
      ${illustrationSVG()}
    </div>`,
  "dipsgrid": (row,t)=>{
    const items = row.items.map(it=>{
      const note = it.note ? `<div class="pill-note marker">${esc(t[it.note])}</div>` : '';
      return `<div class="dip-cell"><div class="dip-name">${esc(t[it.id])}${codesHtml(it.codes)}</div>${note}</div>`;
    }).join('');
    return `<div class="dips-grid">${items}</div>`;
  },
  "salad-variant": (row,t)=>{
    const it = t[row.id] || {};
    const variants = row.variants.map(v=>{
      const key = v.vid.split('.')[1]; // v1 / v2
      return `<div class="variant-row"><span>${esc(it[key])}${codesHtml(v.codes)}</span><span>${gbp(v.price)}</span></div>`;
    }).join('');
    return `<div class="item-block">
      <div class="item-head"><span class="item-name">${newTag(row,t)}${esc(it.name)}</span></div>
      <div class="item-desc">${esc(it.desc)}</div>
      <div class="salad-block">${variants}</div>
    </div>`;
  },
  "calorie-note": (row,t)=>`<div class="calorie-note">
      <div class="calorie-qr" id="calorie-qr-container"></div>
      <div><div>${esc(t['calorie.line1'])}</div><div>${esc(t['calorie.line2'])}</div></div>
    </div>`,
  "winehead": ()=>`<div class="wine-head"><span>175ml</span><span>250ml</span><span>750ml</span></div>`,
  "wine": (row,t)=>{
    const w = t[row.id] || {};
    const prices = row.prices.map(p=>`<span>${p?gbp(p):'\u2014'}</span>`).join('');
    return `<div class="wine-row">
      <div class="wine-top">
        <div><div class="wine-name">${esc(w.name)}</div><div class="wine-desc">${esc(w.desc)}</div></div>
        <div class="wine-prices">${prices}</div>
      </div>
    </div>`;
  },
  "pair": (row,t)=>`<div class="pair-row">
      <div class="item"><span>${esc(t[row.id1])}</span><span class="price">${gbp(row.price1)}</span></div>
      <div class="item"><span>${esc(t[row.id2])}</span><span class="price">${gbp(row.price2)}</span></div>
    </div>`,
  "drink": (row,t)=>{
    const d = t[row.id] || {};
    return `<div class="drink-row">
      <div class="drink-top"><span>${newTag(row,t)}${esc(d.name)}</span></div>
      <div class="drink-desc">${esc(d.desc)}</div>
    </div>`;
  },
  "drink-priced": (row,t)=>{
    const d = t[row.id] || {};
    return `<div class="drink-row">
      <div class="drink-top"><span>${newTag(row,t)}${esc(d.name)}</span><span>${gbp(row.price)}</span></div>
      <div class="drink-desc">${esc(d.desc)}</div>
    </div>`;
  },
};

function legendLine(t){
  const order = ["vg","v","cs","bn","h"];
  const parts = order.map(c=>`${c.toUpperCase()} (${t.legend[c]})`);
  return `<div style="margin-top:6px">${parts.join('  \u00b7  ')}</div>`;
}

    <defs>
      <symbol id="fm-pizza-icon" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#F4E4C2"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="#D9BE8C" stroke-width="1.5"/>
        <circle cx="50" cy="50" r="38" fill="#D6402A"/>

          <ellipse cx="47" cy="65" rx="9.5" ry="6.5" transform="rotate(4 47 65)"/>

function illustrationSVG(){
  return `<svg class="illustration" viewBox="0 0 100 100" aria-hidden="true"><use href="#fm-pizza-icon"></use></svg>`;
}

function renderCol(rows, t){
  let html = '';
  let boxOpen = false;
  let boxBuf = '';
  for(const row of rows){
    if(row.kind === 'section-boxed-start'){ boxOpen = true; boxBuf=''; continue; }
    if(row.kind === 'section-boxed-end'){ html += `<div class="boxed">${boxBuf}</div>`; boxOpen=false; continue; }
    const fn = RENDERERS[row.kind];
    const piece = fn ? fn(row, t) : '';
    if(boxOpen) boxBuf += piece; else html += piece;
  }
  return html;
}

function renderPage(pageKey, t){
  const page = STRUCTURE[pageKey];
  document.getElementById(pageKey+'-colA').innerHTML = renderCol(page.colA, t);
  document.getElementById(pageKey+'-colB').innerHTML = renderCol(page.colB, t);
  document.getElementById(pageKey+'-colC').innerHTML = renderCol(page.colC, t);
}

function renderAll(){
  const t = TRANSLATIONS[currentLang];
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    const val = key.split('.').reduce((o,k)=>o&&o[k], t);
    if(val !== undefined) el.textContent = val;
  });
  renderPage('page1', t);
  renderPage('page2', t);
  setupCalorieQr();
  updateLocalNote();
}

function buildLangRow(){
  const row = document.getElementById('langRow');
  row.innerHTML = LANGUAGES.map(l=>`
    <button type="button" class="lang-chip${l.code===currentLang?' active':''}" data-lang="${l.code}">
      <span>${l.flag}</span><span>${l.label}</span>
    </button>`).join('');
  row.querySelectorAll('.lang-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>setLanguage(btn.getAttribute('data-lang')));
  });
}

function setLanguage(lang){
  if(!TRANSLATIONS[lang]) return;
  currentLang = lang;
  document.querySelectorAll('.lang-chip').forEach(chip=>{
    chip.classList.toggle('active', chip.getAttribute('data-lang')===lang);
  });
  renderAll();
}

function setupPageTabs(){
  document.querySelectorAll('.page-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const el = document.getElementById(btn.getAttribute('data-target'));
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
  const targets = ['sec-page1','sec-page2'].map(id=>document.getElementById(id));
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        document.querySelectorAll('.page-tab').forEach(p=>p.classList.remove('active'));
        const tab = document.querySelector(`.page-tab[data-target="${entry.target.id}"]`);
        if(tab) tab.classList.add('active');
      }
    });
  }, {rootMargin:'-30% 0px -60% 0px'});
  targets.forEach(el=>{ if(el) obs.observe(el); });
}

const FALLBACK_QR_URL = 'https://www.google.com';
const CALORIE_QR_URL = 'https://qr1.be/Y8TE'; // decoded from the real printed menu's "Scan for calories" code
let isLocalFile = false;

function setupCalorieQr(){
  const el = document.getElementById('calorie-qr-container');
  if(!el || typeof QRCode === 'undefined') return;
  el.innerHTML = '';
  new QRCode(el, {
    text: CALORIE_QR_URL, width: 64, height: 64,
    colorDark: '#181410', colorLight: '#FBF8F2', correctLevel: QRCode.CorrectLevel.H
  });
}

function setupQrCode(){
  isLocalFile = window.location.protocol === 'file:';
  const url = isLocalFile ? FALLBACK_QR_URL : window.location.href;
  new QRCode(document.getElementById('qrcode-container'), {
    text: url, width: 160, height: 160,
    colorDark: '#181410', colorLight: '#FBF8F2', correctLevel: QRCode.CorrectLevel.H
  });
  document.getElementById('qrUrlText').textContent = url;
  updateLocalNote();
  document.getElementById('downloadQrBtn').addEventListener('click', ()=>{
    const container = document.getElementById('qrcode-container');
    const canvas = container.querySelector('canvas');
    const imgEl = container.querySelector('img');
    const dataUrl = canvas ? canvas.toDataURL('image/png') : (imgEl ? imgEl.src : null);
    if(!dataUrl) return;
    const a = document.createElement('a');
    a.href = dataUrl; a.download = 'franco-manca-menu-qr.png';
    document.body.appendChild(a); a.click(); a.remove();
  });
}

function updateLocalNote(){
  const noteEl = document.getElementById('qrLocalNote');
  if(!noteEl) return;
  if(isLocalFile){
    noteEl.style.display = 'block';
    noteEl.textContent = TRANSLATIONS[currentLang].ui.localNote;
  } else {
    noteEl.style.display = 'none';
  }
}

document.body.insertAdjacentHTML('afterbegin', pizzaIconSymbol());
buildLangRow();
renderAll();
setupPageTabs();
setupQrCode();

</script>
</body>
